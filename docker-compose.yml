services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transaction_engine
      POSTGRES_USER: transaction_engine
      POSTGRES_PASSWORD: transaction_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transaction_engine -d transaction_engine"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:19092,CONTROLLER://0.0.0.0:19093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:19093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: transaction_engine
      DB_USER: transaction_engine
      DB_PASSWORD: transaction_engine
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      # Demo knob: set to e.g. 1.0 to make every transaction fail processing and land
      # on the DLQ after the retry ceiling. Defaults to 0.0 (never fail).
      BACKEND_SIMULATOR_FAILURE_RATE: "${BACKEND_SIMULATOR_FAILURE_RATE:-0.0}"
      # Recovery-scheduler cadence/thresholds (ADR-006). Defaults are production-ish;
      # override to small values to watch recovery act in a demo.
      RECOVERY_POLL_INTERVAL_MS: "${RECOVERY_POLL_INTERVAL_MS:-300000}"
      RECOVERY_STUCK_TIMEOUT: "${RECOVERY_STUCK_TIMEOUT:-PT10M}"
      RECOVERY_UNPUBLISHED_MIN_AGE: "${RECOVERY_UNPUBLISHED_MIN_AGE:-PT1M}"
      # Structured JSON logs (ECS) in the container — MDC fields (correlationId,
      # transactionId, businessId, status) surface as top-level keys. Local `mvn
      # spring-boot:run` leaves this unset and logs plain, human-readable text.
      LOGGING_STRUCTURED_FORMAT_CONSOLE: "${LOGGING_STRUCTURED_FORMAT_CONSOLE:-ecs}"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres-data:

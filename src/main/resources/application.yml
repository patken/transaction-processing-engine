spring:
  application:
    name: transaction-processing-engine

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transaction_engine}
    username: ${DB_USER:transaction_engine}
    password: ${DB_PASSWORD:transaction_engine}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: transaction-processing-engine

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

transaction-engine:
  backend-simulator:
    dispatch-delay-ms: ${BACKEND_SIMULATOR_DISPATCH_DELAY_MS:20}
    processing-delay-ms: ${BACKEND_SIMULATOR_DELAY_MS:100}
    # 0.0 = never fail. Set > 0 (e.g. 1.0) to exercise the retry → DLQ path manually.
    failure-rate: ${BACKEND_SIMULATOR_FAILURE_RATE:0.0}
  processing:
    # Shared retry ceiling (ADR-004) — reached by consumer processing retries, stuck-transaction
    # recovery, and unpublished-transaction publish retries alike. Beyond it: DEAD_LETTERED + DLQ.
    max-retries: ${PROCESSING_MAX_RETRIES:3}
    backoff-ms: ${PROCESSING_BACKOFF_MS:100}
    backoff-multiplier: ${PROCESSING_BACKOFF_MULTIPLIER:2.0}
  recovery:
    # ShedLock-guarded recovery schedulers (ADR-006). Coarse cadence — this is a safety net,
    # not the primary retry path (that's the consumer's own loop).
    poll-interval-ms: ${RECOVERY_POLL_INTERVAL_MS:300000}   # 5 min
    stuck-timeout: ${RECOVERY_STUCK_TIMEOUT:PT10M}          # in-flight + idle this long = stuck
    unpublished-min-age: ${RECOVERY_UNPUBLISHED_MIN_AGE:PT1M}
    batch-size: ${RECOVERY_BATCH_SIZE:100}
  security:
    # ADR-007: locally-signed JWT, demo-grade only — never reuse this secret for
    # anything beyond this portfolio's demo. Override via JWT_SECRET in any
    # environment that's more than a local/CI throwaway.
    jwt-secret: ${JWT_SECRET:demo-only-secret-do-not-use-in-production-3f8a1c9e2b7d4f6a}

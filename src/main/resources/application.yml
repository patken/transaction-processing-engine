spring:
  application:
    name: transaction-processing-engine

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transaction_engine}
    username: ${DB_USER:transaction_engine}
    password: ${DB_PASSWORD:transaction_engine}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: transaction-processing-engine

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

transaction-engine:
  backend-simulator:
    dispatch-delay-ms: ${BACKEND_SIMULATOR_DISPATCH_DELAY_MS:20}
    processing-delay-ms: ${BACKEND_SIMULATOR_DELAY_MS:100}
